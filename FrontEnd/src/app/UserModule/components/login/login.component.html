<div class="container">
  <form [formGroup]="loginForm"  (ngSubmit)="login()" >
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" class="form-control" formControlName="email" name="email">
      <div class="alert alert-danger" *ngIf="email?.touched && email?.invalid">
        <small *ngIf="email?.errors?.['required']" >Email is required</small>
        <small *ngIf="email?.errors?.['email']" >Invalid email Pattern</small>
      </div>
    </div>
    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" class="form-control" formControlName="password" name="password">
      <div class="alert alert-danger" *ngIf="password?.touched && password?.invalid">
        <small *ngIf="password?.errors?.['required']" >Password is required</small>
      </div>
    </div>
    <button class="btn btn-success mt-2" [disabled]="loginForm.invalid">Login</button>
  </form>
</div>

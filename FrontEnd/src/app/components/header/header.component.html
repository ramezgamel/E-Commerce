<nav class="navbar navbar-expand-lg bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLinkActive="active" style="cursor: pointer;">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLinkActive="active" routerLink="/products">Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/user/register" routerLinkActive="active" [hidden]="!isLogged">Register</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/user/login" routerLinkActive="active" [hidden]="!isLogged">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" (click)="logout()" style="cursor: pointer;">Logout</a>
        </li>
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>

<div class="container-fluid d-flex justify-content-between">
  <div class="btn-group w-100 sec-nav" role="group" aria-label="Basic radio toggle button group">

    <input type="radio" class="btn-check" name="btnradio" id="btnradio" autocomplete="off">
    <label class="btn btn-outline-primary" for="btnradio" routerLink="/products">All</label>

    <ng-container *ngFor="let cat of categories; let i = index">
      <input type="radio" class="btn-check" name="btnradio" id="btnradio{{i}}" autocomplete="off">
      <label class="btn btn-outline-primary" for="btnradio{{i}}" routerLink="/products" [queryParams]="{category:cat._id}">{{cat.name}}</label>
    </ng-container>

    
  </div>
</div>

<form [formGroup]="productForm" (ngSubmit)="createOne()">
  <div class="form-group d-flex mb-2 align-items-center">
    <label for="name" style="width: 15%;">Name:</label>
    <input type="text" class="form-control" id="name" formControlName="name">
  </div>
  <div class="form-group d-flex mb-2 align-items-center">
    <label for="quantity" style="width: 15%;">Quantity:</label>
    <input type="text" class="form-control" id="quantity" formControlName="quantity">
  </div>
  <div class="form-group d-flex mb-2 align-items-center">
    <label for="price" style="width: 15%;">Price:</label>
    <input type="text" class="form-control" id="price" formControlName="price">
  </div>
  <!-- <div class="form-group d-flex mb-2 align-items-center">
    <label for="category" style="width: 15%;">Category:</label>
    <input type="text" class="form-control" id="category" formControlName="category">
  </div> -->
  <div class="form-group d-flex mb-2 align-items-center">
    <label for="category" style="width: 15%;">Category:</label>
    <select class="form-select form-select-lg mb-3" aria-label=".form-select-lg example" formControlName="category">
      <option *ngFor="let cat of categories" [value]="cat._id">{{cat.name}}</option>
    </select>
  </div>
  
  <div class="form-group d-flex mb-2 align-items-center">
    <label for="coverImage" style="width: 15%;">Cover Image:</label>
    <input type="file" class="form-control" id="coverImage"  (change)="onFileChange($event)">
  </div>
  <div class="form-group d-flex mb-2 align-items-center">
    <label for="desc" style="width: 15%;">Description:</label>
    <textarea name="desc" class="form-control" rows="3" formControlName="desc"></textarea>
  </div>
  <button class="btn btn-success">Add</button>
</form>
